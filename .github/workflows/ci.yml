name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - ".gitignore"
      - ".vscode/**"
      - ".claude/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - ".gitignore"
      - ".vscode/**"
      - ".claude/**"

jobs:
  lhci:
    name: Lighthouse CI
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Run Lighthouse CI
        run: bun run lhci
